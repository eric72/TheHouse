; TheHouse — profil graphique LOW (production)
; Steam Deck / GTX 1060 : stabilité FPS, rendu stylisé sans Lumen ni VSM.
; Les .ini du projet sont fusionnés au boot ; ce fichier est appliqué à chaud
; par UTheHouseGraphicsProfileSubsystem (voir aussi GraphicsProfileHigh.ini).
;
; Niveau design : une DirectionalLight avec ombres CSM (pas de VSM).

[ConsoleVariables]
; --- GI / réflexions (pas de Lumen) ---
r.DynamicGlobalIlluminationMethod=0
r.ReflectionMethod=0
r.Lumen.HardwareRayTracing=0
r.Lumen.TraceMeshSDFs=0

; --- Ombres : CSM classique uniquement ---
r.Shadow.Virtual.Enable=0
r.Shadow.CSM.MaxCascades=2
r.Shadow.MaxCSMResolution=1024
r.Shadow.CSMShadowDistanceFadeEndMultiplier=1.0
r.Shadow.DistanceScale=0.85

; --- Ray tracing / chemin lourd ---
; Ne pas forcer r.RayTracing=0 avec Nanite activé (DefaultEngine) : assert possible
; « RenderData->RayTracingProxy != nullptr » (NaniteResources.cpp). Le coût RT reste
; faible si les ombres / effets RT sont off ; le projet a déjà r.RayTracing.Shadows=False.
r.RayTracing.Shadows=0
r.PathTracing=0

; --- Résolution adaptative (dynamic resolution) ---
r.DynamicRes.OperationMode=1
r.DynamicRes.FrameTimeBudget=33.4
r.DynamicRes.MinScreenPercentage=55
r.DynamicRes.MaxScreenPercentage=100

; --- Mémoire / streaming ---
r.VirtualTextures=0
r.Nanite.MaxPixelsPerEdge=8

; --- Poste AA léger (TSR coûteux sur GPU faible : TAA + screen %) ---
r.AntiAliasingMethod=0
r.TemporalAA.Upsampling=0
r.MSAACount=2

; --- Divers perf ---
r.DefaultFeature.MotionBlur=0
fx.Niagara.QualityLevel=1
