; TheHouse — profil graphique HIGH (développement / captures)
; Non utilisé en build Shipping (verrouillage côté code).
; VSM reste désactivé (politique projet) ; Lumen autorisé pour itération visuelle.

[ConsoleVariables]
; --- Lumen (GI + réflexions) ---
r.DynamicGlobalIlluminationMethod=1
r.ReflectionMethod=1

; --- Ombres : CSM plus généreux, toujours sans VSM ---
r.Shadow.Virtual.Enable=0
r.Shadow.CSM.MaxCascades=4
r.Shadow.MaxCSMResolution=2048
r.Shadow.DistanceScale=1.0

; --- Ray tracing (suivre DefaultEngine / carte ; ici on ne force pas l’activation) ---
r.PathTracing=0

; --- Résolution : pas de budget dynamique forcé (capture / dev) ---
r.DynamicRes.OperationMode=0
r.ScreenPercentage.Default=100

; --- Qualité visuelle ---
r.VirtualTextures=1
r.Nanite.MaxPixelsPerEdge=4
r.AntiAliasingMethod=2
r.TemporalAA.Upsampling=1
fx.Niagara.QualityLevel=3
